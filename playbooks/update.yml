---
- name: Update and upgrade all systems
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update and upgrade packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600
      register: apt_result

    - name: Remove unsued packages
      ansible.builtin.apt:
        autoremove: yes

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Notify if reboot required
      ansible.builtin.debug:
       msg: "Reboot requiterd on {{ inventory_hostname }}"
      when: reboot_required.stat.exists

    - name: Show update summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Packages changed: {{ apt_result.changed }}"
          - "Stdout:"
          - "{{ apt_result.stdout_lines | default('No output') }}"


